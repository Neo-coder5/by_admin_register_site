{% extends 'base.html' %}
{% block content %}
<h1>Faculty List</h1>
<a href="{% url 'faculty_create' %}">Add New Faculty</a>
<table border="1" cellpadding="5" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Actions</th>
    </tr>
    {% for faculty in faculties %}
    <tr>
        <td>{{ faculty.id }}</td>
        <td>{{ faculty.name }}</td>
        <td>
            <a href="{% url 'faculty_edit' faculty.pk %}">Edit</a> |
            <a href="{% url 'faculty_delete' faculty.pk %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No faculties found</td></tr>
    {% endfor %}
</table>
{% endblock %}
